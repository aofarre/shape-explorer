<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔷 Shape Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      color: white;
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 2px 3px 6px rgba(0,0,0,0.3);
      letter-spacing: 1px;
    }

    .subtitle {
      color: rgba(255,255,255,0.85);
      font-size: 1.1rem;
      margin-bottom: 30px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 36px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .select-wrapper {
      width: 100%;
      position: relative;
    }

    select {
      width: 100%;
      padding: 14px 44px 14px 18px;
      font-size: 1.2rem;
      font-family: inherit;
      border: 3px solid #a78bfa;
      border-radius: 14px;
      background: #f5f3ff;
      color: #4c1d95;
      font-weight: 600;
      cursor: pointer;
      appearance: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }

    .select-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      pointer-events: none;
    }

    optgroup {
      font-size: 0.9rem;
      color: #6b7280;
      font-weight: 700;
      font-style: normal;
    }

    option {
      font-size: 1.1rem;
      color: #1f2937;
      font-weight: 600;
      padding: 6px;
    }

    .shape-display {
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
      border: 3px dashed #c4b5fd;
      transition: background 0.4s;
    }

    .shape-display svg {
      filter: drop-shadow(4px 6px 12px rgba(0,0,0,0.18));
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0%   { transform: scale(0.4) rotate(-8deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg);    opacity: 1; }
    }

    .placeholder-text {
      color: #9ca3af;
      font-size: 1rem;
      text-align: center;
      line-height: 1.5;
    }
    .placeholder-text span { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    .shape-name {
      font-size: 2rem;
      font-weight: 800;
      color: #4c1d95;
      text-align: center;
      min-height: 2.4rem;
      letter-spacing: 0.5px;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-left: 8px;
      vertical-align: middle;
    }
    .badge-2d { background: #dbeafe; color: #1d4ed8; }
    .badge-3d { background: #fce7f3; color: #be185d; }

    .speak-btn {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 40px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 20px rgba(239,68,68,0.4);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .speak-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(239,68,68,0.5); }
    .speak-btn:active { transform: translateY(0px); }
    .speak-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .fun-fact {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      color: #78350f;
      width: 100%;
      line-height: 1.5;
      min-height: 62px;
    }
  </style>
</head>
<body>

  <h1>🔷 Shape Explorer</h1>
  <p class="subtitle">Pick a shape and learn about it!</p>

  <div class="card">

    <div class="select-wrapper">
      <select id="shapeSelect">
        <option value="">-- Choose a Shape! --</option>
        <optgroup label="🧊 3D Shapes (Solid)">
          <option value="sphere">🔵 Sphere</option>
          <option value="cube">🎲 Cube</option>
          <option value="cylinder">🥫 Cylinder</option>
          <option value="cone">🔺 Cone</option>
          <option value="pyramid">🔺 Pyramid</option>
          <option value="rectangular-prism">📦 Rectangular Prism</option>
          <option value="triangular-prism">🔷 Triangular Prism</option>
        </optgroup>
        <optgroup label="✏️ 2D Shapes (Flat)">
          <option value="circle">⬤ Circle</option>
          <option value="square">■ Square</option>
          <option value="triangle">▲ Triangle</option>
          <option value="rectangle">▬ Rectangle</option>
          <option value="pentagon">⬠ Pentagon</option>
          <option value="hexagon">⬡ Hexagon</option>
          <option value="octagon">⯃ Octagon</option>
          <option value="star">★ Star</option>
          <option value="heart">♥ Heart</option>
          <option value="diamond">◆ Diamond</option>
          <option value="oval">⬭ Oval</option>
          <option value="trapezoid">⏢ Trapezoid</option>
        </optgroup>
      </select>
      <span class="select-arrow">▼</span>
    </div>

    <div class="shape-display" id="shapeDisplay">
      <div class="placeholder-text">
        <span>👆</span>
        Pick a shape above<br>to see it here!
      </div>
    </div>

    <div class="shape-name" id="shapeName"></div>

    <button class="speak-btn" id="speakBtn" disabled onclick="speakShape()">
      🔊 Say It!
    </button>

    <div id="speechWarning" style="display:none; font-size:0.85rem; color:#92400e; background:#fef3c7; border-radius:10px; padding:10px 14px; width:100%; text-align:center;">
      🔇 Sound isn't supported in this browser.<br>Try opening in <strong>Chrome</strong> for audio! 🎵
    </div>

    <div class="fun-fact" id="funFact" style="display:none"></div>

  </div>

  <script>
    const shapes = {
      circle: {
        label: 'Circle',
        type: '2D',
        fact: 'A circle has no corners or edges — every point on it is the same distance from the center! 🌟',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <radialGradient id="cg" cx="38%" cy="35%">
              <stop offset="0%" stop-color="#ff9f43"/>
              <stop offset="100%" stop-color="#ee5a24"/>
            </radialGradient>
          </defs>
          <circle cx="120" cy="120" r="108" fill="url(#cg)" stroke="#d63031" stroke-width="4"/>
        </svg>`
      },
      square: {
        label: 'Square',
        type: '2D',
        fact: 'A square has 4 equal sides and 4 equal corners. It is a special rectangle! 🟥',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#54a0ff"/>
              <stop offset="100%" stop-color="#2e86de"/>
            </linearGradient>
          </defs>
          <rect x="16" y="16" width="208" height="208" rx="10" fill="url(#sg)" stroke="#1a6cbf" stroke-width="4"/>
        </svg>`
      },
      triangle: {
        label: 'Triangle',
        type: '2D',
        fact: 'A triangle has 3 sides and 3 corners. Triangles are super strong shapes used in bridges! 🌉',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="tg" x1="50%" y1="0%" x2="50%" y2="100%">
              <stop offset="0%" stop-color="#5f27cd"/>
              <stop offset="100%" stop-color="#341f97"/>
            </linearGradient>
          </defs>
          <polygon points="120,14 228,226 12,226" fill="url(#tg)" stroke="#2d0faa" stroke-width="4" stroke-linejoin="round"/>
        </svg>`
      },
      rectangle: {
        label: 'Rectangle',
        type: '2D',
        fact: 'A rectangle has 4 sides where opposite sides are the same length. A door is a rectangle! 🚪',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00d2d3"/>
              <stop offset="100%" stop-color="#00a8a8"/>
            </linearGradient>
          </defs>
          <rect x="12" y="52" width="216" height="136" rx="10" fill="url(#rg)" stroke="#007c7c" stroke-width="4"/>
        </svg>`
      },
      pentagon: {
        label: 'Pentagon',
        type: '2D',
        fact: 'A pentagon has 5 sides and 5 corners. The famous Pentagon building in the USA is shaped like one! 🏛️',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff6b6b"/>
              <stop offset="100%" stop-color="#ee5a24"/>
            </linearGradient>
          </defs>
          <polygon points="120,12 228,88 187,214 53,214 12,88" fill="url(#pg)" stroke="#c0392b" stroke-width="4" stroke-linejoin="round"/>
        </svg>`
      },
      hexagon: {
        label: 'Hexagon',
        type: '2D',
        fact: 'A hexagon has 6 sides. Bees build their honeycombs in hexagons — very clever! 🐝🍯',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffd32a"/>
              <stop offset="100%" stop-color="#f9ca24"/>
            </linearGradient>
          </defs>
          <polygon points="120,12 220,66 220,174 120,228 20,174 20,66" fill="url(#hg)" stroke="#d4ac00" stroke-width="4" stroke-linejoin="round"/>
        </svg>`
      },
      octagon: {
        label: 'Octagon',
        type: '2D',
        fact: 'An octagon has 8 sides. Stop signs are octagons — you see them every day! 🛑',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e84393"/>
              <stop offset="100%" stop-color="#be2edd"/>
            </linearGradient>
          </defs>
          <polygon points="80,12 160,12 228,80 228,160 160,228 80,228 12,160 12,80" fill="url(#og)" stroke="#8e1ec4" stroke-width="4" stroke-linejoin="round"/>
        </svg>`
      },
      star: {
        label: 'Star',
        type: '2D',
        fact: 'A star shape has 5 points! Stars in the sky are actually huge balls of fire, just very far away! ⭐',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="stg" x1="50%" y1="0%" x2="50%" y2="100%">
              <stop offset="0%" stop-color="#f9ca24"/>
              <stop offset="100%" stop-color="#f0932b"/>
            </linearGradient>
          </defs>
          <polygon points="120,14 147,90 228,90 165,138 188,214 120,166 52,214 75,138 12,90 93,90" fill="url(#stg)" stroke="#d4a017" stroke-width="4" stroke-linejoin="round"/>
        </svg>`
      },
      heart: {
        label: 'Heart',
        type: '2D',
        fact: 'The heart shape represents love! Your real heart pumps blood around your whole body! ❤️',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="heg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff6b81"/>
              <stop offset="100%" stop-color="#ff4757"/>
            </linearGradient>
          </defs>
          <path d="M120,210 C120,210 20,150 20,82 C20,46 46,24 76,24 C96,24 112,34 120,48 C128,34 144,24 164,24 C194,24 220,46 220,82 C220,150 120,210 120,210 Z" fill="url(#heg)" stroke="#c0392b" stroke-width="4"/>
        </svg>`
      },
      diamond: {
        label: 'Diamond',
        type: '2D',
        fact: 'A diamond shape is a square tilted 45 degrees. Real diamonds are the hardest natural material on Earth! 💎',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="dig" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#74b9ff"/>
              <stop offset="100%" stop-color="#0984e3"/>
            </linearGradient>
          </defs>
          <polygon points="120,14 226,120 120,226 14,120" fill="url(#dig)" stroke="#2176ae" stroke-width="4" stroke-linejoin="round"/>
        </svg>`
      },
      oval: {
        label: 'Oval',
        type: '2D',
        fact: 'An oval (or ellipse) is like a stretched circle. Eggs are oval shaped! 🥚',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <radialGradient id="evg" cx="38%" cy="35%">
              <stop offset="0%" stop-color="#a29bfe"/>
              <stop offset="100%" stop-color="#6c5ce7"/>
            </radialGradient>
          </defs>
          <ellipse cx="120" cy="120" rx="108" ry="72" fill="url(#evg)" stroke="#4a3ab5" stroke-width="4"/>
        </svg>`
      },
      trapezoid: {
        label: 'Trapezoid',
        type: '2D',
        fact: 'A trapezoid has 4 sides where exactly one pair of sides is parallel. It looks like a table top! 🪑',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="trg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#55efc4"/>
              <stop offset="100%" stop-color="#00b894"/>
            </linearGradient>
          </defs>
          <polygon points="64,60 176,60 228,180 12,180" fill="url(#trg)" stroke="#007a5c" stroke-width="4" stroke-linejoin="round"/>
        </svg>`
      },
      sphere: {
        label: 'Sphere',
        type: '3D',
        fact: 'A sphere is a perfectly round 3D shape — like a ball! The Earth is almost a perfect sphere! 🌍',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <radialGradient id="spg" cx="38%" cy="32%">
              <stop offset="0%" stop-color="#fd9644"/>
              <stop offset="60%" stop-color="#e55039"/>
              <stop offset="100%" stop-color="#922b21"/>
            </radialGradient>
          </defs>
          <circle cx="120" cy="120" r="108" fill="url(#spg)" stroke="#7b241c" stroke-width="2"/>
          <ellipse cx="120" cy="120" rx="108" ry="32" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
          <ellipse cx="120" cy="120" rx="32" ry="108" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
          <ellipse cx="88" cy="74" rx="22" ry="13" fill="rgba(255,255,255,0.28)" transform="rotate(-30,88,74)"/>
        </svg>`
      },
      cube: {
        label: 'Cube',
        type: '3D',
        fact: 'A cube has 6 faces, 12 edges, and 8 corners. All its sides are equal squares — like a dice! 🎲',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <polygon points="120,20 218,72 218,172 120,224 22,172 22,72" fill="#3498db" stroke="#1a6cbf" stroke-width="2"/>
          <polygon points="120,20 218,72 120,124 22,72" fill="#5dade2" stroke="#1a6cbf" stroke-width="2"/>
          <polygon points="22,72 120,124 120,224 22,172" fill="#1f618d" stroke="#1a6cbf" stroke-width="2"/>
          <polygon points="218,72 120,124 120,224 218,172" fill="#2e86c1" stroke="#1a6cbf" stroke-width="2"/>
          <line x1="120" y1="20" x2="120" y2="124" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          <line x1="22" y1="72" x2="218" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
        </svg>`
      },
      cylinder: {
        label: 'Cylinder',
        type: '3D',
        fact: 'A cylinder has 2 flat circular ends and 1 curved side. Cans of soup are cylinders! 🥫',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="cylg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#27ae60"/>
              <stop offset="50%" stop-color="#58d68d"/>
              <stop offset="100%" stop-color="#1e8449"/>
            </linearGradient>
          </defs>
          <rect x="28" y="72" width="184" height="140" rx="4" fill="url(#cylg)" stroke="#186a3b" stroke-width="2"/>
          <ellipse cx="120" cy="212" rx="92" ry="28" fill="#1e8449" stroke="#186a3b" stroke-width="2"/>
          <ellipse cx="120" cy="72" rx="92" ry="28" fill="#82e0aa" stroke="#186a3b" stroke-width="2"/>
        </svg>`
      },
      cone: {
        label: 'Cone',
        type: '3D',
        fact: 'A cone has a circular base and comes to a point at the top. Ice cream cones are exactly that shape! 🍦',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="cong" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f0932b"/>
              <stop offset="100%" stop-color="#d35400"/>
            </linearGradient>
          </defs>
          <polygon points="120,18 228,218 12,218" fill="url(#cong)" stroke="#b7410e" stroke-width="2" stroke-linejoin="round"/>
          <ellipse cx="120" cy="218" rx="108" ry="22" fill="#e67e22" stroke="#b7410e" stroke-width="2"/>
          <line x1="120" y1="18" x2="120" y2="218" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
        </svg>`
      },
      pyramid: {
        label: 'Pyramid',
        type: '3D',
        fact: 'A pyramid has a square base and 4 triangular sides. The ancient Egyptians built enormous pyramids! 🏺',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <polygon points="120,18 210,200 30,200" fill="#9b59b6" stroke="#6c3483" stroke-width="2" stroke-linejoin="round"/>
          <polygon points="120,18 210,200 170,220 30,200" fill="#7d3c98" stroke="#6c3483" stroke-width="2" stroke-linejoin="round"/>
          <polygon points="30,200 170,220 210,200" fill="#5b2c6f" stroke="#6c3483" stroke-width="2" stroke-linejoin="round"/>
          <line x1="120" y1="18" x2="120" y2="200" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        </svg>`
      },
      'rectangular-prism': {
        label: 'Rectangular Prism',
        type: '3D',
        fact: 'A rectangular prism looks like a box! It has 6 rectangular faces. Books and shoeboxes are this shape! 📦',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <polygon points="28,80 188,80 188,212 28,212" fill="#16a085" stroke="#0e6655" stroke-width="2"/>
          <polygon points="28,80 188,80 228,44 68,44" fill="#1abc9c" stroke="#0e6655" stroke-width="2"/>
          <polygon points="188,80 228,44 228,176 188,212" fill="#0e8a74" stroke="#0e6655" stroke-width="2"/>
        </svg>`
      },
      'triangular-prism': {
        label: 'Triangular Prism',
        type: '3D',
        fact: 'A triangular prism has 5 faces — 2 triangles and 3 rectangles. It can split light into a rainbow! 🌈',
        svg: `<svg width="240" height="240" viewBox="0 0 240 240">
          <polygon points="60,200 180,200 120,70" fill="#8e44ad" stroke="#6c3483" stroke-width="2" stroke-linejoin="round"/>
          <polygon points="180,200 220,160 160,30 120,70" fill="#9b59b6" stroke="#6c3483" stroke-width="2"/>
          <polygon points="60,200 180,200 220,160 80,160" fill="#6c3483" stroke="#5b2c6f" stroke-width="2"/>
          <line x1="120" y1="70" x2="160" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        </svg>`
      }
    };

    const select     = document.getElementById('shapeSelect');
    const display    = document.getElementById('shapeDisplay');
    const nameEl     = document.getElementById('shapeName');
    const speakBtn   = document.getElementById('speakBtn');
    const funFactEl  = document.getElementById('funFact');

    // Pre-load voices as soon as they are available (required on Android Chrome)
    let voices = [];
    let speechSupported = ('speechSynthesis' in window);

    function loadVoices() {
      voices = speechSynthesis.getVoices();
    }
    if (speechSupported) {
      loadVoices();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
      }
      // After a short wait, if still no voices, mark as unsupported
      setTimeout(() => {
        if (speechSynthesis.getVoices().length === 0) {
          speechSupported = false;
          document.getElementById('speakBtn').style.display = 'none';
          document.getElementById('speechWarning').style.display = 'block';
        }
      }, 1500);
    } else {
      document.getElementById('speakBtn').style.display = 'none';
      document.getElementById('speechWarning').style.display = 'block';
    }

    select.addEventListener('change', () => {
      const key = select.value;
      if (!key || !shapes[key]) {
        display.innerHTML = `<div class="placeholder-text"><span>👆</span>Pick a shape above<br>to see it here!</div>`;
        nameEl.innerHTML = '';
        speakBtn.disabled = true;
        funFactEl.style.display = 'none';
        return;
      }
      const s = shapes[key];
      display.innerHTML = s.svg;
      const badge = `<span class="badge badge-${s.type.toLowerCase()}">${s.type}</span>`;
      nameEl.innerHTML = s.label + badge;
      speakBtn.disabled = false;
      funFactEl.style.display = 'block';
      funFactEl.textContent = '💡 ' + s.fact;

      // Speak immediately inside the user-gesture event (no setTimeout — required on Android)
      if (speechSupported) speakShape();
    });

    function speakShape() {
      const key = select.value;
      if (!key || !shapes[key]) return;
      if (!('speechSynthesis' in window)) return;
      const utterance = new SpeechSynthesisUtterance(shapes[key].label);
      utterance.rate   = 0.85;
      utterance.pitch  = 1.1;
      utterance.volume = 1;
      // Prefer an English voice if available
      const enVoice = voices.find(v => v.lang.startsWith('en'));
      if (enVoice) utterance.voice = enVoice;
      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }
  </script>
</body>
